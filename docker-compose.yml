services:
  java-vul:
    build:
      context: .
      dockerfile: java/java-vul/Dockerfile
    container_name: devsec-java-verify
    profiles:
      - local
    networks:
      - devsec

  java-fixed:
    build:
      context: .
      dockerfile: java/java-fixed/Dockerfile
    container_name: devsec-java-fixed
    profiles:
      - local
    networks:
      - devsec

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: devsec-server
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - JAVA_SERVICE_ADDR=http://java-vul:8081
      - JAVA_FIXED_SERVICE_ADDR=http://java-fixed:8082
      - DATA_PATH=/app/data
      - DIST_PATH=/app/dist
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/auth/check"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devsec

networks:
  devsec:
    driver: bridge
