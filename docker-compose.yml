services:
  java-verify:
    build:
      context: .
      dockerfile: java/java-vul-verify/Dockerfile
    container_name: devsec-java-verify
    security_opt:
      - no-new-privileges:true
    read_only: true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
      - /var/tmp
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/vul/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  java-fixed:
    build:
      context: .
      dockerfile: java/java-vul-fixed/Dockerfile
    container_name: devsec-java-fixed
    security_opt:
      - no-new-privileges:true
    read_only: true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
      - /var/tmp
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8082/vul/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: devsec-server
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - JAVA_SERVICE_ADDR=http://java-verify:8081
      - JAVA_FIXED_SERVICE_ADDR=http://java-fixed:8082
      - DATA_PATH=/app/data
      - DIST_PATH=/app/dist
    depends_on:
      java-verify:
        condition: service_healthy
      java-fixed:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/auth/check"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - frontend
      - backend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
